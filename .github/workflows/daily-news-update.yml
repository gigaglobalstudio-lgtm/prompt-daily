name: Daily AI News Update

on:
  schedule:
    # 매일 오전 7시 KST (UTC 22:00 전날)
    - cron: '0 22 * * *'
  workflow_dispatch: # 수동 실행 가능

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Fetch and update news
        run: node scripts/fetch-news.mjs

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add src/data/news.json
          git diff --staged --quiet || git commit -m "Daily news update: $(date +'%Y-%m-%d')"
          git push origin master

      - name: Build and deploy to GitHub Pages
        run: |
          npm run build
          npx gh-pages -d dist -u "GitHub Action <action@github.com>"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
